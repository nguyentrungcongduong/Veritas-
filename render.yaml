services:
  - type: web
    name: veritas-backend
    env: docker # Dùng Docker vì Native PHP đang bị lỗi "invalid runtime"
    plan: free # Phải để plan: free thì mới không tốn tiền
    dockerContext: backend
    dockerfilePath: backend/Dockerfile.render
    envVars:
      - fromGroup: veritas-shared-secrets
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: CORS_ALLOWED_ORIGINS
        value: "*"

envVarGroups:
  - name: veritas-shared-secrets
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: sync
