services:
  # 1. Backend Service (Laravel)
  - type: web
    name: veritas-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile.render
    envVars:
      - fromGroup: veritas-shared-secrets
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: CORS_ALLOWED_ORIGINS
        value: "*"

  # 2. Worker Service (Queues)
  - type: worker
    name: veritas-worker
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile.render
    dockerCommand: "php artisan queue:work --tries=3"
    envVars:
      - fromGroup: veritas-shared-secrets
      - key: APP_ENV
        value: production
      - key: DB_CONNECTION
        value: pgsql

envVarGroups: # Corrected field name
  - name: veritas-shared-secrets
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
