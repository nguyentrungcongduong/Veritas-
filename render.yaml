services:
  - type: web
    name: veritas-backend
    env: php
    plan: free # Quan trọng để không tốn tiền
    rootDir: backend
    buildCommand: "composer install --no-dev --optimize-autoloader && php artisan migrate --force"
    startCommand: "apache2-foreground" # Lệnh chạy mặc định của Render PHP
    envVars:
      - fromGroup: veritas-shared-secrets
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DOCUMENT_ROOT
        value: public # Chỉ định Laravel public folder
      - key: CORS_ALLOWED_ORIGINS
        value: "*"

envVarGroups:
  - name: veritas-shared-secrets
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: sync # Chuyển về sync vì không có Worker ở gói Free
