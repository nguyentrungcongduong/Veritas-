services:
  - type: web
    name: veritas-backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfilePath: backend/Dockerfile.render
    envVars:
      - fromGroup: veritas-shared-secrets
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true # Bật lên để xem lỗi 500 là gì
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: require # Bắt buộc phải có cái này cho Neon
      - key: CORS_ALLOWED_ORIGINS
        value: "*"

envVarGroups:
  - name: veritas-shared-secrets
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: APP_KEY
        sync: false # Bạn điền tay cái base64 tui gửi vào Dashboard nhé
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: sync
