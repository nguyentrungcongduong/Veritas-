services:
  - type: web
    name: veritas-backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfilePath: backend/Dockerfile.render
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true # Tui để true để mình còn thấy lỗi mà fix nhen!
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: require # Neon cần cái này
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      # Các biến này sẽ lấy từ Dashboard bạn đã điền:
      - key: DB_HOST
        sync: true
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: true
      - key: DB_USERNAME
        sync: true
      - key: DB_PASSWORD
        sync: true
      - key: APP_KEY
        sync: true
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: sync
